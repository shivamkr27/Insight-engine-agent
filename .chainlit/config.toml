[project]
enable_telemetry = false
session_timeout  = 3600

[features]
unsafe_allow_html = false
multi_modal       = true

[UI]
name          = "InsightEngine AI"
description   = "Intelligent document research assistant"
default_theme = "dark"
layout        = "wide"
hide_cta      = true
custom_css    = "/public/custom.css"

[UI.theme]
default = "dark"

[UI.theme.dark]
background = "#0B1120"
paper      = "#0F1A2E"
primary    = "#4F8EF7"

[UI.theme.light]
background = "#0B1120"
paper      = "#0F1A2E"
primary    = "#4F8EF7"

[meta]
generated_by = "chainlit"
