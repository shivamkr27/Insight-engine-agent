[project]
enable_telemetry = false
session_timeout  = 3600

[features]
unsafe_allow_html = false
multi_modal       = true

[UI]
name          = "InsightEngine AI"
description   = "Intelligent document assistant"
default_theme = "dark"
layout        = "wide"
hide_cta      = true
custom_css    = "/public/custom.css"

[UI.theme]
default = "dark"

[UI.theme.dark]
background = "#0D0F1A"
paper      = "#111827"
primary    = "#F0BA72"

[UI.theme.light]
background = "#F0F4F8"
paper      = "#FFFFFF"
primary    = "#1E3A5F"

[meta]
generated_by = "chainlit"
